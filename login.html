<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSDATAHUB - Login</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0077FF">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0A0F1E, #1A2333);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
   .container { max-width: 28rem; width: 100%; text-align: center; }
   .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 119, 255, 0.2);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 119, 255, 0.2);
    }
   .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(0, 119, 255, 0.3);
      object-fit: cover;
      border: 2px solid rgba(0, 119, 255, 0.3);
    }
   .h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0, 119, 255, 0.3);
    }
   .h1 .ms { color: #0077FF; }
   .h1 .data { color: #F5F7FA; }
   .h1 .sub { color: #FF8C00; }
   .tagline {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 4px;
      font-weight: 600;
    }
   .tagline .ahead { color: #FF8C00; }
   .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(0, 119, 255, 0.2);
      color: white;
      font-size: 16px;
      backdrop-filter: blur(10px);
      margin-bottom: 12px;
      transition: all 0.2s;
    }
   .input::placeholder { color: rgba(255, 255, 255, 0.6); }
   .input:focus {
      outline: none;
      border-color: #0077FF;
      background: rgba(0, 119, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(0, 119, 255, 0.1);
    }
   .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
      margin-bottom: 12px;
    }
   .btn-primary {
      background: linear-gradient(135deg, #0077FF, #0055CC);
      color: white;
      box-shadow: 0 4px 16px rgba(0, 119, 255, 0.4);
    }
   .btn-primary:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(0, 119, 255, 0.5);
    }
   .btn-secondary {
      background: linear-gradient(135deg, #FF8C00, #FF6B00);
      color: white;
      border: none;
      box-shadow: 0 4px 16px rgba(255, 140, 0, 0.3);
    }
   .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 140, 0, 0.4);
    }
   .btn-ghost {
      background: transparent;
      color: #F5F7FA;
      border: 1px solid rgba(0, 119, 255, 0.3);
    }
   .btn-ghost:hover {
      background: rgba(0, 119, 255, 0.1);
      border-color: #0077FF;
    }
   .showBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #0077FF;
      cursor: pointer;
      font-weight: 600;
    }
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loginLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,15,30,0.9);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;">
    <div style="width:70px;height:70px;border:6px solid rgba(0,119,255,0.2);border-top:6px solid #0077FF;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p style="margin-top:15px">Logging in...</p>
  </div>

  <div class="container">
    <div class="glass-card">
      <h1 class="h1"><span class="ms">MS</span><span class="data">DATA</span><span class="sub">SUB</span></h1>
      <p class="tagline">STAY CONNECTED. <span class="ahead">STAY AHEAD</span></p>
  </div>

  <div class="container">
    <div class="glass-card">
      <img src="images/ms.png" class="logo" alt="Logo">
      <h1 class="h1">Welcome Back</h1>
      <p class="tagline">Cheap, Affordable, Fast</p>

      <input id="loginUsername" class="input" placeholder="Username or Email">

      <div style="position:relative;">
        <input id="loginPassword" type="password" class="input" placeholder="Password">
        <button class="showBtn" onclick="togglePassword()">Show</button>
      </div>

      <button id="loginBtn" class="btn btn-primary">Login</button>
      <button onclick="biometricLogin()" class="btn btn-ghost">🔐 Login with Fingerprint / Face ID</button>
      <a href="signup.html" class="btn btn-secondary">Create Account</a>
    </div>
    <a href="https://wa.me/2348067892342?text=I%20forgot%20my%20password" class="btn btn-ghost">Forgot Password?</a>
  </div>

<script>
  const API = "https://mayconnect-backend-1.onrender.com";

const usernameInput = document.getElementById("loginUsername");
const passwordInput = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const biometricBtn = document.getElementById("biometricBtn");
const loader = document.getElementById("loginLoader");
const welcomeSound = new Audio("sounds/welcome.mp3");

document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("token")) window.location.href = "dashboard.html";
});

function togglePassword(){
  if(!passwordInput) return;
  passwordInput.type = passwordInput.type === "password"? "text" : "password";
}

async function login(){
  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();
  if(!username ||!password){ alert("Saka username da password"); return; }

  loginBtn.disabled = true; loader.style.display = "flex";
  try{
    const res = await fetch(API + "/api/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.message || "Login failed");
    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.username);
    localStorage.setItem("userId", data.userId);
    if(data.is_admin) alert("Barka da zuwa Admin");
    welcomeSound.play().catch(()=>{});
    setTimeout(()=> window.location.href = "dashboard.html", 600);
  }catch(err){
    console.error(err);
    alert(err.message || "Server error");
    loader.style.display = "none";
    loginBtn.disabled = false;
  }
}

loginBtn.addEventListener("click", login);
if(biometricBtn) biometricBtn.addEventListener("click", biometricLogin);

/* ================= HELPERS ================= */

function base64urlToArrayBuffer(base64url) {

  if (!base64url) {
    throw new Error("Missing base64url value");
  }

  const padding =
    "=".repeat((4 - (base64url.length % 4)) % 4);

  const base64 =
    (base64url + padding)
     .replace(/-/g, "+")
     .replace(/_/g, "/");

  const binary = atob(base64);

  const bytes = new Uint8Array(binary.length);

  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  return bytes.buffer;
}

function arrayBufferToBase64url(buffer) {

  const bytes = new Uint8Array(buffer);

  let binary = "";

  for (const b of bytes) {
    binary += String.fromCharCode(b);
  }

  return btoa(binary)
   .replace(/\+/g, "-")
   .replace(/\//g, "_")
   .replace(/=/g, "");

}

/* ================= LOGIN ================= */

async function biometricLogin() {

  try {

    const res = await fetch(
      API + "/api/auth/webauthn/login-start",
      {
        method: "POST",
        credentials: "include"
      }
    );

    const options = await res.json();

    if (!res.ok) {
      throw new Error(options.error || "Login start failed");
    }

    const publicKey = {
      challenge: base64urlToArrayBuffer(
        options.challenge
      ),
      rpId: options.rpId,
      timeout: options.timeout,
      userVerification:
        options.userVerification || "preferred"
    };

    if (
      Array.isArray(options.allowCredentials) &&
      options.allowCredentials.length > 0
    ) {

      publicKey.allowCredentials =
        options.allowCredentials.map(c => ({

          type: "public-key",

          id: base64urlToArrayBuffer(
            String(c.id).trim()
          ),

          transports:
            Array.isArray(c.transports)
             ? c.transports
              : ["internal", "hybrid"]

        }));

    }

    const credential =
      await navigator.credentials.get({
        publicKey
      });

    if (!credential) {
      throw new Error("Cancelled");
    }

    const authRes = await fetch(
      API + "/api/auth/webauthn/login-finish",
      {
        method: "POST",
        credentials: "include",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          id: credential.id,

          rawId:
            arrayBufferToBase64url(
              credential.rawId
            ),

          response: {

            authenticatorData:
              arrayBufferToBase64url(
                credential.response.authenticatorData
              ),

            clientDataJSON:
              arrayBufferToBase64url(
                credential.response.clientDataJSON
              ),

            signature:
              arrayBufferToBase64url(
                credential.response.signature
              ),

            userHandle:
              credential.response.userHandle
               ? arrayBufferToBase64url(
                    credential.response.userHandle
                  )
                : null

          },

          type: credential.type

        })
      }
    );

    const data = await authRes.json();

    if (!authRes.ok) {
      throw new Error(
        data.error || "Verification failed"
      );
    }

   
    localStorage.setItem(
  "token",
  data.token
);

if (data.user) {

  localStorage.setItem(
    "userId",
    data.user.id
  );

  localStorage.setItem(
    "username",
    data.user.username
  );

  localStorage.setItem(
    "email",
    data.user.email || ""
  );

}

    location.href = "dashboard.html";

  }
  catch (err) {

    console.error(err);

  }

}
</script>
</body>
</html>
