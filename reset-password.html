<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEEVERSH DATA PLUG - Reset Password</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#9333ea">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0b2e, #2d1b4e);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
   .container { max-width: 28rem; width: 100%; text-align: center; }
   .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
   .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      object-fit: cover;
    }
   .h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
   .tagline {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 24px;
      font-weight: 500;
    }
   .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 16px;
      backdrop-filter: blur(10px);
      margin-bottom: 12px;
    }
   .input::placeholder { color: rgba(255, 255, 255, 0.7); }
   .input:focus {
      outline: none;
      border-color: #9333ea;
      background: rgba(255, 255, 255, 0.15);
    }
   .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
      margin-bottom: 12px;
    }
   .btn-primary {
      background: white;
      color: #9333ea;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
   .btn-primary:hover { transform: translateY(-2px); }
   .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
   .btn-ghost {
      background: transparent;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
   .showBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9333ea;
      cursor: pointer;
      font-weight: 600;
    }
   .msg {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 500;
      min-height: 20px;
    }
   .msg.error { color: #FCA5A5; }
   .msg.success { color: #86EFAC; }
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="resetLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:9999;flex-direction:column;">
    <div style="width:70px;height:70px;border:6px solid #2c0526;border-top:6px solid #9333ea;border-radius:50%;animation:spin 1s linear infinite;"></div>
    <p style="margin-top:15px">Updating password...</p>
  </div>

  <div class="container">
    <div class="glass-card">
      <img src="images/TEEVERSH.png" class="logo" alt="Logo">
      <h1 class="h1">Set New Password</h1>
      <p class="tagline">Choose a strong password to secure your account</p>

      <div style="position:relative;">
        <input id="newPassword" type="password" class="input" placeholder="New Password - min 6 characters">
        <button class="showBtn" onclick="togglePassword('newPassword', this)">Show</button>
      </div>

      <div style="position:relative;">
        <input id="confirmPassword" type="password" class="input" placeholder="Confirm New Password">
        <button class="showBtn" onclick="togglePassword('confirmPassword', this)">Show</button>
      </div>

      <button id="resetBtn" class="btn btn-primary">Update Password</button>
      <a href="login.html" class="btn btn-ghost">Back to Login</a>
      
      <div id="msg" class="msg"></div>
    </div>
  </div>

<script>
const API = "https://mayconnect-backend-1.onrender.com";
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');
const resetBtn = document.getElementById('resetBtn');
const loader = document.getElementById('resetLoader');
const msg = document.getElementById('msg');

// Redirect if link is invalid
if (!token || !email) {
  msg.className = 'msg error';
  msg.innerText = 'Invalid or missing reset link. Contact support.';
  resetBtn.disabled = true;
}

function togglePassword(id, btn) {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    btn.innerText = "Hide";
  } else {
    input.type = "password";
    btn.innerText = "Show";
  }
}

resetBtn.addEventListener('click', resetPassword);

async function resetPassword() {
  const password = document.getElementById('newPassword').value.trim();
  const confirm = document.getElementById('confirmPassword').value.trim();

  if (password.length < 6) {
    msg.className = 'msg error';
    msg.innerText = 'Password must be at least 6 characters';
    return;
  }
  if (password !== confirm) {
    msg.className = 'msg error';
    msg.innerText = 'Passwords do not match';
    return;
  }

  resetBtn.disabled = true;
  loader.style.display = "flex";
  msg.innerText = '';

  try {
    const res = await fetch(API + "/api/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, token, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || "Reset failed");
    
    loader.style.display = "none";
    msg.className = 'msg success';
    msg.innerText = data.message + ' Redirecting to login...';
    
    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch (err) {
    loader.style.display = "none";
    resetBtn.disabled = false;
    msg.className = 'msg error';
    msg.innerText = err.message || "Server error. Try again.";
  }
}

// Allow Enter key to submit
document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') resetPassword();
});
</script>
</body>
</html>
